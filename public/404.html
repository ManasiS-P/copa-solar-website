<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Copa Solar</title>
    <script>
      // Redirect unknown GitHub Pages paths to index.html so React Router can handle them.
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        var newUrl =
          l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
          "/?p=/" +
          l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/") +
          (l.search ? "&q=" + l.search.slice(1) : "") +
          l.hash;
        l.replace(newUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
